<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SOVD Client</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1c1c1c, #2c3e50);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.5s ease;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .card {
            background: #2c2c2c;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
            min-width: 350px;
        }

        .status {
            font-size: 32px;
            font-weight: bold;
            transition: all 0.4s ease;
        }

        .ok {
            color: #00ff99;
            text-shadow: 0 0 15px rgba(0,255,150,0.6);
        }

        .fault {
            color: #ff4d4d;
            text-shadow: 0 0 20px rgba(255,70,70,0.8);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Popup */
        .popup {
            position: fixed;
            top: 30px;
            right: -400px;
            background: #333;
            color: white;
            padding: 25px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transition: right 0.5s ease;
            font-weight: bold;
            font-size: 18px;
        }

        .popup.show {
            right: 30px;
        }

        .popup.fault {
            background: linear-gradient(135deg, #ff4d4d, #b30000);
        }

        .popup.ok {
            background: linear-gradient(135deg, #00cc66, #00994d);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚗 Vehicle State</h1>

    <div class="card">
        <div id="status" class="status">
            ⏳ Esperando eventos...
        </div>
    </div>

</div>

<div id="popup" class="popup"></div>

<script>
    const statusDiv = document.getElementById("status");
    const popup = document.getElementById("popup");

    const eventSource = new EventSource("/events");

    function showPopup(message, type) {
        popup.innerHTML = message;
        popup.className = "popup show " + type;

        setTimeout(() => {
            popup.className = "popup " + type;
        }, 3000);
    }

    eventSource.onmessage = function(event) {
        console.log("Evento recibido:", event.data);

        if (event.data === "FAULT") {
            document.body.style.background = "linear-gradient(135deg, #3b0000, #1c1c1c)";
            
            statusDiv.innerHTML = "🚨 FAULT: LED_REAR";
            statusDiv.className = "status fault";

            showPopup("⚠️ Fallo en LED REAR LEFT", "fault");

        } else if (event.data === "OK") {
            document.body.style.background = "linear-gradient(135deg, #1c1c1c, #2c3e50)";
            
            statusDiv.innerHTML = "✅ SYSTEM OK";
            statusDiv.className = "status ok";

            showPopup("✅ Sistema recuperado", "ok");
        }
    };

    eventSource.onerror = function(error) {
        console.error("Error SSE:", error);
    };
</script>

</body>
</html>
